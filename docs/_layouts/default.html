<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ '/assets/brand/openmira-og.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/brand/favicon-16.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/brand/favicon-32.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/brand/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}" aria-label="Open Mira home">
      <picture>
        <source srcset="{{ '/assets/brand/openmira-logo-600.webp' | relative_url }}" type="image/webp">
        <img src="{{ '/assets/brand/openmira-logo-600.png' | relative_url }}" alt="Open Mira logo" width="300" height="58">
      </picture>
    </a>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/install/' | relative_url }}">Install</a>
      <a href="{{ '/capabilities/' | relative_url }}">Capabilities</a>
      <a href="{{ '/safety/' | relative_url }}">Safety</a>
      <a href="{{ '/architecture/' | relative_url }}">Architecture</a>
      <a href="https://github.com/worldoptimizer/openmira/releases/latest">Download</a>
    </nav>
  </header>
  <main class="page-shell">
    {{ content }}
  </main>
  <footer class="site-footer">
    <span>AGPL-3.0-or-later.</span>
    <a href="https://github.com/worldoptimizer/openmira">GitHub</a>
    <a href="https://github.com/worldoptimizer/openmira/releases/latest">Latest release</a>
  </footer>
</body>
</html>
